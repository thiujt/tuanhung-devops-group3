name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tododb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tododb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: tododb
      DB_USER: postgres
      DB_PASSWORD: postgres
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize test database
        env:
          PGPASSWORD: postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done
          psql -h localhost -U postgres -d tododb -f ./database/database.sql

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            apt-get update
            apt-get install -y git docker-compose psmisc || true

            mkdir -p /home/app
            cd /home/app

            if [ ! -d tuanhung-devops-group3 ]; then
              git clone https://github.com/thiujt/tuanhung-devops-group3.git
            fi

            cd /home/app/tuanhung-devops-group3
            git fetch origin
            git reset --hard origin/main

            sudo fuser -k 13001/tcp || true
            sudo fuser -k 18081/tcp || true

            docker ps -aq --filter "name=tuanhung-devops-group3" | xargs -r docker rm -f

            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose down --remove-orphans || true
              docker-compose up -d --build --remove-orphans
              docker-compose ps
            else
              docker compose down --remove-orphans || true
              docker compose up -d --build --remove-orphans
              docker compose ps
            fi